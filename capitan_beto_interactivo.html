
<style>
  #hint { font-size: 13px; color: var(--color-text-tertiary); text-align: center; margin: 4px 0 2px 0; }
  #info-panel {
    min-height: 80px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 14px 18px;
    margin: 8px 0 0 0;
    display: flex; gap: 12px; align-items: flex-start;
  }
  #info-num {
    font-size: 28px; font-weight: 500; line-height: 1;
    min-width: 32px; text-align: center; margin-top: 2px;
  }
  #info-text { flex: 1; }
  #info-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 5px 0; }
  #info-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin: 0; }
  .part { cursor: pointer; transition: opacity 0.15s; }
  .part:hover { opacity: 0.7; }
  .part.active { opacity: 1; }
  .part.active .highlight { stroke-width: 3 !important; }
  text { font-family: var(--font-sans); }
</style>

<p id="hint">Toca cualquier parte del cohete para aprender qué hace</p>

<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Capitán Beto — partes básicas interactivas</title>
  <desc>Cohete Capitán Beto en vista lateral con 9 partes interactivas numeradas</desc>

  <!-- ===================== COHETE (orientación horizontal, punta a la izquierda) ===================== -->
  <!-- Total largo: ~500px, centrado entre x=90 y x=590, eje central y=140 -->

  <!-- 1. NARIZ -->
  <g class="part" id="p1" onclick="sel(1)">
    <path class="highlight" d="M90,140 C110,140 130,128 155,124 L155,156 C130,152 110,140 90,140 Z"
      fill="none" stroke="#185FA5" stroke-width="1.5"/>
    <!-- número -->
    <circle cx="100" cy="118" r="9" fill="#185FA5"/>
    <text x="100" y="122" text-anchor="middle" font-size="11" fill="white" font-weight="500">1</text>
    <line x1="100" y1="127" x2="118" y2="133" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- 2. CORDÓN DE CHOQUE (representado como línea ondulada arriba) -->
  <g class="part" id="p2" onclick="sel(2)">
    <path class="highlight" d="M155,132 Q175,118 195,128 Q215,118 235,128 Q245,122 255,124"
      fill="none" stroke="#BA7517" stroke-width="1.8" stroke-dasharray="4,2"/>
    <circle cx="165" cy="108" r="9" fill="#BA7517"/>
    <text x="165" y="112" text-anchor="middle" font-size="11" fill="white" font-weight="500">2</text>
    <line x1="165" y1="117" x2="185" y2="124" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- 3. FUSELAJE (cuerpo principal, tubo largo) -->
  <g class="part" id="p3" onclick="sel(3)">
    <rect class="highlight" x="155" y="124" width="310" height="32" rx="0"
      fill="none" stroke="#185FA5" stroke-width="1.5"/>
    <circle cx="310" cy="100" r="9" fill="#185FA5"/>
    <text x="310" y="104" text-anchor="middle" font-size="11" fill="white" font-weight="500">3</text>
    <line x1="310" y1="109" x2="310" y2="124" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- 5. PARACAÍDAS (dentro del fuselaje, lado nariz) -->
  <g class="part" id="p5" onclick="sel(5)">
    <path class="highlight" d="M172,134 Q185,126 200,130 Q215,126 228,134 Q218,142 200,140 Q182,142 172,134Z"
      fill="none" stroke="#639922" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="182" y1="138" x2="187" y2="144" stroke="#639922" stroke-width="0.8"/>
    <line x1="200" y1="140" x2="200" y2="145" stroke="#639922" stroke-width="0.8"/>
    <line x1="218" y1="138" x2="213" y2="144" stroke="#639922" stroke-width="0.8"/>
    <circle cx="245" cy="108" r="9" fill="#639922"/>
    <text x="245" y="112" text-anchor="middle" font-size="11" fill="white" font-weight="500">5</text>
    <line x1="245" y1="117" x2="220" y2="132" stroke="#639922" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- 4. MONTURA DEL MOTOR (soporte interno del motor) -->
  <g class="part" id="p4" onclick="sel(4)">
    <rect class="highlight" x="400" y="129" width="55" height="22" rx="1"
      fill="none" stroke="#533" stroke-width="1.2" stroke-dasharray="3,2"/>
    <circle cx="415" cy="175" r="9" fill="#533"/>
    <text x="415" y="179" text-anchor="middle" font-size="11" fill="white" font-weight="500">4</text>
    <line x1="415" y1="166" x2="415" y2="156" stroke="#533" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- 8. MOTOR (rectángulo gris interior) -->
  <g class="part" id="p8" onclick="sel(8)">
    <rect class="highlight" x="402" y="131" width="50" height="18" rx="1"
      fill="#e0e0e0" stroke="#A32D2D" stroke-width="1.8"/>
    <text x="427" y="143" text-anchor="middle" font-size="8" fill="#A32D2D" font-weight="500" letter-spacing="0.5">C6-5</text>
    <circle cx="480" cy="175" r="9" fill="#A32D2D"/>
    <text x="480" y="179" text-anchor="middle" font-size="11" fill="white" font-weight="500">8</text>
    <line x1="480" y1="166" x2="450" y2="150" stroke="#A32D2D" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- 6. GUÍAS DE LANZAMIENTO (pequeños rectángulos en la parte inferior del fuselaje) -->
  <g class="part" id="p6" onclick="sel(6)">
    <rect class="highlight" x="248" y="156" width="14" height="8" rx="1"
      fill="none" stroke="#533" stroke-width="1.4"/>
    <rect x="338" y="156" width="14" height="8" rx="1"
      fill="none" stroke="#533" stroke-width="1.4"/>
    <circle cx="275" cy="175" r="9" fill="#533"/>
    <text x="275" y="179" text-anchor="middle" font-size="11" fill="white" font-weight="500">6</text>
    <line x1="265" y1="175" x2="257" y2="164" stroke="#533" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- 7. ALETAS (triángulos en parte trasera) -->
  <g class="part" id="p7" onclick="sel(7)">
    <!-- aleta superior -->
    <path class="highlight" d="M465,124 L510,92 L510,124 Z"
      fill="none" stroke="#0F6E56" stroke-width="1.8"/>
    <!-- aleta inferior -->
    <path class="highlight" d="M465,156 L510,188 L510,156 Z"
      fill="none" stroke="#0F6E56" stroke-width="1.8"/>
    <circle cx="540" cy="108" r="9" fill="#0F6E56"/>
    <text x="540" y="112" text-anchor="middle" font-size="11" fill="white" font-weight="500">7</text>
    <line x1="532" y1="115" x2="512" y2="120" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- Tobera / final fuselaje -->
  <rect x="455" y="124" width="18" height="32" rx="0" fill="none" stroke="#185FA5" stroke-width="1.5"/>

  <!-- 9. IGNITOR (parte trasera, pequeño pin) -->
  <g class="part" id="p9" onclick="sel(9)">
    <line class="highlight" x1="473" y1="136" x2="492" y2="140" stroke="#A32D2D" stroke-width="2.5"/>
    <circle cx="494" cy="140" r="3" fill="#A32D2D"/>
    <circle cx="540" cy="175" r="9" fill="#A32D2D"/>
    <text x="540" y="179" text-anchor="middle" font-size="11" fill="white" font-weight="500">9</text>
    <line x1="540" y1="166" x2="510" y2="148" stroke="#A32D2D" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- Línea de eje (referencia) -->
  <line x1="90" y1="140" x2="473" y2="140" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="6,4"/>

</svg>

<div id="info-panel">
  <div id="info-num" style="color: var(--color-text-tertiary);">?</div>
  <div id="info-text">
    <p id="info-name" style="color: var(--color-text-tertiary); font-weight: 400; font-size: 14px;">Toca una parte del cohete arriba</p>
    <p id="info-desc"></p>
  </div>
</div>

<script>
const partes = {
  1: { nombre: "Nariz", color: "#185FA5",
       desc: "Es la punta del cohete, con forma aerodinámica. Su trabajo es guiar el aire alrededor del cohete para que pueda subir más rápido y sin perder energía peleando contra el viento. Generalmente es de plástico o balsa." },
  2: { nombre: "Cordón de choque", color: "#BA7517",
       desc: "Es una cuerda elástica que une la nariz con el fuselaje. Cuando el paracaídas se abre de golpe, este cordón absorbe el jalón para que nada se rompa. ¡Es como el cinturón de seguridad del cohete!" },
  3: { nombre: "Fuselaje", color: "#185FA5",
       desc: "Es el cuerpo principal del cohete, el tubo largo que lo sostiene todo. Adentro van las aletas, la nariz, el paracaídas y el motor. Es la estructura base sobre la que se construye todo lo demás." },
  4: { nombre: "Montura del motor", color: "#553333",
       desc: "Es el soporte que centra y sostiene el motor dentro del fuselaje. Transmite el empuje del motor a todo el cohete para que suba derecho. Sin ella, el motor se movería y el cohete volaría chueco." },
  5: { nombre: "Paracaídas", color: "#639922",
       desc: "Es el sistema de recuperación del cohete. Está plegado dentro del fuselaje y cuando el motor termina, se despliega para que el cohete baje lento y no se dañe al aterrizar. En este proyecto se usó hilo de nylon para mayor resistencia." },
  6: { nombre: "Guías de lanzamiento", color: "#553333",
       desc: "Son pequeños tubitos o argollas pegadas al fuselaje. Se deslizan por la varilla de la plataforma de lanzamiento para mantener el cohete derecho justo al inicio del vuelo, cuando todavía va lento y las aletas aún no pueden estabilizarlo." },
  7: { nombre: "Aletas", color: "#0F6E56",
       desc: "Son las 'alas' del cohete en la parte de atrás. Funcionan como el plumaje de una flecha: evitan que el cohete se voltee o gire mientras sube. En este proyecto se eligieron aletas largas para lograr mayor estabilidad en el vuelo." },
  8: { nombre: "Motor (C6-5)", color: "#A32D2D",
       desc: "Es el corazón del cohete. El modelo C6-5 significa: C = categoría de potencia, 6 = 6 Newtons de empuje promedio, 5 = 5 segundos de retardo antes de expulsar el paracaídas. Quema combustible sólido y genera los gases que lanzan el cohete." },
  9: { nombre: "Ignitor", color: "#A32D2D",
       desc: "Es el pin eléctrico que enciende el motor. Se conecta a los cables del controlador de lanzamiento y al recibir corriente eléctrica genera una chispa que prende el combustible del motor de forma segura y controlada." }
};

let active = null;

function sel(n) {
  if (active !== null) {
    const el = document.getElementById('p' + active);
    if (el) el.classList.remove('active');
  }
  active = n;
  const el = document.getElementById('p' + n);
  if (el) el.classList.add('active');
  const p = partes[n];
  document.getElementById('info-num').textContent = n;
  document.getElementById('info-num').style.color = p.color;
  const nm = document.getElementById('info-name');
  nm.textContent = p.nombre;
  nm.style.color = p.color;
  nm.style.fontWeight = '500';
  nm.style.fontSize = '15px';
  document.getElementById('info-desc').textContent = p.desc;
}
</script>
